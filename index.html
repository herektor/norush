  <head>

      html, body {
        margin: 0;
        padding: 0;
        background: #0A0A0F;

        touch-action: pan-x pan-y;

        -webkit-user-select: text;
        user-select: text;
        font-size: 16px !important; /* Prevents iOS zoom on focus */

      /* Allow map containers to handle their own touch events */
      .leaflet-container {
        touch-action: none;
      }
